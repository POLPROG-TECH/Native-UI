<!-- native-ui logotype — dark-mode variant (brighter text + lighter subtitle) -->
<svg xmlns="http://www.w3.org/2000/svg" width="520" height="180" viewBox="0 0 520 180" fill="none" role="img" aria-label="native-ui — React Native design system">
  <defs>
    <linearGradient id="nud-bg" x1="20" y1="20" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A84FF"/>
      <stop offset="0.55" stop-color="#3B6BFF"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="nud-tint" x1="20" y1="160" x2="160" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A84FF" stop-opacity="0"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="nud-hl" x1="20" y1="20" x2="20" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.38"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nud-text" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.5" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#C4B5FD"/>
    </linearGradient>
    <filter id="nud-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#nud-shadow)">
    <rect x="20" y="20" width="140" height="140" rx="34" fill="url(#nud-bg)"/>
    <rect x="20" y="20" width="140" height="140" rx="34" fill="url(#nud-tint)"/>
    <rect x="20" y="20" width="140" height="140" rx="34" fill="url(#nud-hl)"/>
    <rect x="20.75" y="20.75" width="138.5" height="138.5" rx="33.25" fill="none" stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="1.5"/>

    <path d="M 62 50 L 48 50 L 48 130 L 62 130"
          stroke="#FFFFFF" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M 118 50 L 132 50 L 132 130 L 118 130"
          stroke="#FFFFFF" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="42" y="84" width="96" height="12" rx="6" transform="rotate(52 90 90)" fill="#FFFFFF"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Segoe UI', Roboto, sans-serif">
    <text x="188" y="102" font-size="64" font-weight="800" letter-spacing="-2" fill="url(#nud-text)">native-ui</text>
    <text x="190" y="132" font-size="12" font-weight="600" letter-spacing="5.2" fill="#94A3B8">REACT&#160;NATIVE&#160;DESIGN&#160;SYSTEM</text>
  </g>
</svg>
