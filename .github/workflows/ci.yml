name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace=@polprog/native-ui

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace=@polprog/native-ui

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run test:ci --workspace=@polprog/native-ui
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: packages/native-ui/coverage

  stories-check:
    name: Story Coverage
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run stories:check --workspace=@polprog/native-ui

  build:
    name: Build Library
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@polprog/native-ui
      - name: Verify publish tarball contents
        run: npm run verify-tarball --workspace=@polprog/native-ui
      - uses: actions/upload-artifact@v7
        with:
          name: native-ui-dist
          path: packages/native-ui/dist

  audit-deps:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: install
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx --yes audit-ci --moderate

  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build-storybook
      - uses: actions/upload-artifact@v7
        with:
          name: storybook-static
          path: apps/storybook/storybook-static

  a11y:
    name: Accessibility (axe)
    runs-on: ubuntu-latest
    needs: build-storybook
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: storybook-static
          path: apps/storybook/storybook-static
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run a11y test-runner against static Storybook
        run: npm run test-runner:ci --workspace=@polprog/storybook

  chromatic:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: build-storybook
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - uses: chromaui/action@latest
        if: env.CHROMATIC_PROJECT_TOKEN != ''
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: build-storybook
          workingDir: .
          exitZeroOnChanges: true
          exitOnceUploaded: true
