name: Bug report
description: Report a defect in @polprog/native-ui
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a report! Please fill in the sections below so we can reproduce the issue quickly.
  - type: input
    id: version
    attributes:
      label: Library version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: rn-version
    attributes:
      label: React Native version
      placeholder: "0.79.2"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - iOS
        - Android
        - Web (react-native-web)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Ideally, a minimal Snack/Expo repro or code snippet.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: shell
